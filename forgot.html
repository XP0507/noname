<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>
  <header class="site-header compact-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span><strong>NOVA LAB</strong><small>Future Gear Store</small></span></a>
      <nav class="main-nav">

        <a href="destinations.html">产品展示</a>

        <a class="nav-action" href="register.html">注册会员</a>
      </nav>
    </div>
  </header>
  <main class="auth-page">
    <form class="auth-form single-form" id="forgotForm" action="login.html" method="get">
      <h1>找回密码</h1>
      <p class="auth-message" id="forgotMessage" role="status" aria-live="polite"></p>
      <label for="resetEmail">注册邮箱</label>
      <input id="resetEmail" type="email" name="email" placeholder="请输入注册邮箱" required>
      <button type="submit">发送验证邮件</button>
      <p class="form-tip"><a href="login.html">返回登录</a></p>
    </form>
  </main>
