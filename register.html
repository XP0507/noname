<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册会员 - NOVA LAB</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>
  <header class="site-header compact-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span><strong>NOVA LAB</strong><small>Future Gear Store</small></span></a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="destinations.html">产品展示</a>
        <a href="news.html">品牌资讯</a>
        <a href="about.html">关于我们</a>
        <a href="login.html">登录</a>
        <a class="active nav-action" href="register.html">注册会员</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-shell register-shell">
      <div class="auth-intro">
        <p class="eyebrow">Join NOVA</p>
        <h1>创建会员账号</h1>
        <p>获得新品提醒、会员专属价、线下体验预约和售后进度查询服务。</p>
      </div>
      <form class="auth-form" id="registerForm" action="login.html" method="get">
        <h2>注册会员</h2>
        <p class="auth-message" id="registerMessage" role="status" aria-live="polite"></p>
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" placeholder="4-16位字母或数字" pattern="[A-Za-z0-9]{4,16}" required>

        <label for="phone">手机号码</label>
        <input id="phone" name="phone" type="tel" placeholder="请输入11位手机号" pattern="1[3-9][0-9]{9}" required>

        <label for="email">电子邮箱</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required>

        <label for="password">设置密码</label>
        <input id="password" name="password" type="password" placeholder="至少6位字符" minlength="6" required>

        <label for="interest">感兴趣的品类</label>
        <select id="interest" name="interest" required>
          <option value="">请选择品类</option>
          <option value="audio">无线音频</option>
          <option value="keyboard">机械键盘</option>
          <option value="watch">智能穿戴</option>
          <option value="desk">桌面配件</option>
        </select>

        <label class="check-line agree-line"><input type="checkbox" name="agree" required><span>我已阅读并同意会员服务条款</span></label>
        <button type="submit">完成注册</button>
        <p class="form-tip">已有账号？<a href="login.html">返回登录</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>版权所有 © 2026 NOVA LAB　桂ICP备20260701号</p>
  </footer>
  <script src="js/ambient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
