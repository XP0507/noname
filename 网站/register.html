<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户注册 - 海丝北海</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header compact-header">
    <div class="brand-row">
      <a class="logo" href="index.html" aria-label="海丝北海首页">
        <span class="logo-mark">海</span>
        <span><strong>海丝北海</strong><small>Beihai Travel Guide</small></span>
      </a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="destinations.html">景点展示</a>
        <a href="news.html">新闻动态</a>
        <a href="about.html">关于我们</a>
        <a href="login.html">登录</a>
        <a class="active nav-btn" href="register.html">注册</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-panel register-panel">
      <div class="auth-visual">
        <p class="section-kicker">加入我们</p>
        <h1>创建你的北海旅行账号</h1>
        <p>注册后可以收藏景点、提交留言、获取活动通知，轻松管理个人旅行计划。</p>
      </div>
      <form class="auth-form" action="login.html" method="get">
        <h2>用户注册</h2>
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" placeholder="4-16位字母或数字" pattern="[A-Za-z0-9]{4,16}" required>

        <label for="phone">手机号码</label>
        <input id="phone" name="phone" type="tel" placeholder="请输入11位手机号" pattern="1[3-9][0-9]{9}" required>

        <label for="email">电子邮箱</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required>

        <label for="password">设置密码</label>
        <input id="password" name="password" type="password" placeholder="至少6位字符" minlength="6" required>

        <label for="travelType">旅行偏好</label>
        <select id="travelType" name="travelType" required>
          <option value="">请选择偏好</option>
          <option value="family">亲子休闲</option>
          <option value="culture">历史文化</option>
          <option value="food">美食探店</option>
          <option value="island">海岛度假</option>
        </select>

        <label class="check-line agree-line">
          <input type="checkbox" name="agree" required>
          <span>我已阅读并同意网站服务条款</span>
        </label>

        <button type="submit">立即注册</button>
        <p class="form-tip">已有账号？<a href="login.html">返回登录</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>版权所有 © 2026 海丝北海　桂ICP备20260630号</p>
  </footer>
</body>
</html>
