<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员登录 - NOVA LAB</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="ambient-canvas" aria-hidden="true"></canvas>
  <header class="site-header compact-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span><strong>NOVA LAB</strong><small>Future Gear Store</small></span></a>
      <nav class="main-nav">
        <a href="index.html">首页</a>
        <a href="destinations.html">产品展示</a>
        <a href="news.html">品牌资讯</a>
        <a href="about.html">关于我们</a>
        <a class="active" href="login.html">登录</a>
        <a class="nav-action" href="register.html">注册会员</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-shell">
      <div class="auth-intro">
        <p class="eyebrow">Member Center</p>
        <h1>欢迎回来</h1>
        <p>登录后可查看会员价格、收藏装备方案、查询售后进度，并预约线下体验。</p>
      </div>
      <form class="auth-form" id="loginForm" action="index.html" method="get">
        <h2>会员登录</h2>
        <p class="auth-message" id="loginMessage" role="status" aria-live="polite"></p>
        <label for="loginAccount">手机号或邮箱</label>
        <input id="loginAccount" name="account" type="text" placeholder="请输入手机号或邮箱" required>

        <label for="loginPassword">登录密码</label>
        <input id="loginPassword" name="password" type="password" placeholder="请输入至少6位密码" minlength="6" required>

        <div class="form-row">
          <label class="check-line"><input type="checkbox" name="remember"><span>保持登录</span></label>
          <a href="forgot.html">忘记密码？</a>
        </div>

        <button type="submit">登录</button>
        <p class="form-tip">还没有账号？<a href="register.html">立即注册</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>版权所有 © 2026 NOVA LAB　桂ICP备20260701号</p>
  </footer>
  <script src="js/ambient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
